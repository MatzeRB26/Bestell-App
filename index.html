<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="fov icon" href="./assets/icons/fov-icon.svg" type="" />

        <link rel="stylesheet" href="./styles/fonts.css"/>
        <link rel="stylesheet" href="./styles/standart.css"/>
        <link rel="stylesheet" href="./styles/responsive.css"/>
        <link rel="stylesheet" href="./styles/basket.css"/>
        <link rel="stylesheet" href="./styles/dialog.css"/>
        <link rel="stylesheet" href="style.css"/>

        <script src="./scripts/template.js"></script>
        <script src="./scripts/db.js"></script>
        <script src="./script.js" defer></script>
        <title>Hunger auf 🍔🍕oder🥗</title>
    </head>
    <body onload="init()">
        <div class="body-img">
            <img src="./assets/img/header-image.jpg" alt="bg-img" />
        </div>
        <header>
            <div class="header-content">
                <img class="logo" src="./assets/icons/Logo 02.svg" alt="Logo" />
                <img class="nav-logo" src="./assets/icons/navbar.svg" />
            </div>
        </header>
        <main>
            <div class="burger-logo">
                <img src="./assets/icons/main-icon.png" alt="bg-logo" />
            </div>
            <div class="top-text">
                <div class="bh-and-rating">
                    <h1><span class="bg">Burger</span>House</h1>
                    <img
                        src="./assets/icons/rating-icon.png"
                        alt="rating-img"
                    />
                </div>
                <p>
                    The best of Burgers, Pizza and Greens, all in one great
                    place.
                </p>
            </div>

            <div class="layout-container">
                <div class="menu-headline">
                <section class="menu-container">
                        <div class="headline-content">
                            <img
                                src="./assets/icons/burger-icon.png"
                                alt="burger-icon"
                            />
                            <h2>Burger & Sandwiches</h2>
                        </div>
                    </div>
                    <section id="burger-menu">
                        <div class="dishes-content">
                            <div id="burger-dishes"></div>
                        </div>
                    </section>
                </section>

                <div class="menu-headline">
                    <section class="menu-container">
                        <div class="headline-content">
                            <img
                                src="./assets/icons/pizza-icon.png"
                                alt="pizza-icon"
                            />
                            <h2>Pizza<span> (30cm)</span></h2>
                        </div>
                </div>
                    <section id="pizza-menu">
                        <div class="dishes-content">
                            <div id="pizza-dishes"></div>
                        </div>
                    </section>
                </section>

                <div class="menu-headline">
                    <section class="menu-container">
                        <div class="headline-content">
                            <img
                                src="./assets/icons/salad-icon.png"
                                alt="salad-icon"
                            />
                            <h2>Salad</h2>
                        </div>
                </div>
                    <section id="salad-menu">
                        <div class="dishes-content">
                            <div id="salad-dishes"></div>
                        </div>
                    </section>
                </section>
                
                <aside>
                    <div class="basket-container" id="basket-container">
                        <div id="basket-content">
                            <div class="basket-text">
                                <h3>Your Basket</h3>
                                <p>
                                    Nothing here yet.<br>Go ahead and choose something</br>delicious!
                                </p>
                                <img
                                class="shopcart"
                                src="./assets/icons/shopping-cart-icon.png"
                                alt="Shopcart"
                                />
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
        <footer>
            <div class="footer-content">
                <div class="copy-text">
                    <img src="./assets/icons/copyright.svg" alt="copyright" />
                    <p>2025 BurgerHouse</p>
                </div>
                <p>Imprint</p>
                <p>Cookie Preferences</p>
            </div>
        </footer>
        <dialog id="dialog" onclick="closeDialog()">
            <div class="dialog-content">
                <button class="img-x">
                    <img
                    src="./assets/icons/close.svg"
                    />
                </button>
                    <img
                class="truck"
                src="./assets/icons/delivery-truck-icon.png"
                    />
                <h3>Order confirmed!</h3>
                <p>Your food is on the way!</p>
            </div>
        </dialog>

        <nav id="mobile-navbar">
            <div class="mobile-content">
                    <img src="assets/icons/home-icon-white.png">
                    <img src="assets/icons/person-icon-white.png">
                    <img src="assets/icons/menu-icon-white.png">
                <div class="m-basket-icon">
                <img class="cart-icon"
                    src="assets/icons/shopping-cart-icon-white.png"
                    alt="basket-icon"
                    onclick="openBasketMobile()"
                />
                <p id="mobile-cart">0</p>
                </div>
            </div>
        </nav>

        <dialog id="basket-mobile">
            <div class="mobile-basket-content">
                <div id="basket-mobile-content" onclick="closeBasketMobile()"></div>
            </div>
        </dialog>
    </body>
</html>
