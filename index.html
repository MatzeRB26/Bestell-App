<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="fov icon" href="./assets/icons/fov-icon.svg" type="" />

        <link rel="stylesheet" href="./styles/fonts.css" />
        <link rel="stylesheet" href="./styles/standart.css" />
        <link rel="stylesheet" href="./styles/basket.css" />
        <link rel="stylesheet" href="./styles/dialog.css" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="./styles/responsive.css" />

        <script src="./scripts/template.js" defer></script>
        <script src="./scripts/db.js" defer></script>
        <script src="./script.js" defer></script>
        <title>Bestell-App</title>
    </head>
    <body onload="init()">
        <header>
            <div class="header-content">
                <img class="logo" src="./assets/icons/Logo 02.svg" alt="Logo" />
                <img class="nav-logo" src="./assets/icons/navbar.svg" />
            </div>
        </header>

        <div class="body-img">
            <img src="./assets/img/header-image.jpg" alt="bg-img" />
        </div>

        <main>
            <!-- 1. Restaurant Info Bereich (zentriert) -->
            <section class="restaurant-info">
                <div class="burger-logo">
                    <img src="./assets/icons/main-icon.png" alt="bg-logo" />
                </div>
                <div class="top-text content-width">
                    <div class="bh-and-rating">
                        <h1><span class="bg">Burger</span>House</h1>
                        <img
                            src="./assets/icons/rating-icon.png"
                            alt="rating-img"
                        />
                    </div>
                    <p>
                        The best of Burgers, Pizza and Greens, all in one great
                        place.
                    </p>
                </div>
            </section>

            <!-- 2. Der Hauptinhalt: Menü links, Basket rechts -->
            <div class="main-layout content-width">
                <!-- Linke Seite: Alle Menü-Kategorien -->
                <div class="menu-container">
                    <!-- Burger Sektion -->
                    <div class="category-wrapper">
                        <div class="full-width-orange">
                            <div class="headline-content">
                                <div class="headline-text-wrapper">
                                    <img
                                        src="assets/icons/Chanese 1.svg"
                                        alt="burger-icon"
                                    />
                                    <h2>
                                        Burger
                                        <span class="text-sw"
                                            >& Sandwiches</span
                                        >
                                    </h2>
                                </div>
                            </div>
                        </div>

                        <div id="burger-dishes" class="dishes-list"></div>
                    </div>

                    <!-- Pizza Sektion -->
                    <div class="category-wrapper">
                        <div class="full-width-orange">
                            <div class="headline-content">
                                <div class="headline-text-wrapper">
                                    <img
                                        src="assets/icons/Pizza 1.svg"
                                        alt="pizza-icon"
                                    />
                                    <h2>
                                        Pizza <span class="p-maß">(30cm)</span>
                                    </h2>
                                </div>
                            </div>
                        </div>

                        <div id="pizza-dishes" class="dishes-list"></div>
                    </div>

                    <!-- Salad Sektion -->
                    <div class="category-wrapper">
                        <div class="full-width-orange">
                            <div class="headline-content">
                                <div class="headline-text-wrapper">
                                    <img
                                        src="assets/icons/Salad 1.svg"
                                        alt="salad-icon"
                                    />
                                    <h2>Salad</h2>
                                </div>
                            </div>
                        </div>

                        <div id="salad-dishes" class="dishes-list"></div>
                    </div>
                </div>

                <!-- Rechte Seite: Der Sticky Warenkorb -->
                <aside class="basket-sidebar">
                    <div id="basket-container" class="basket-card">
                        <div id="basket-content">
                            <!-- Wird per JS befüllt -->
                        </div>
                    </div>
                </aside>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <span>&copy; 2025 BurgerHouse</span>
                <a href="#">Imprint</a>
                <a href="#">Cookie Preferences</a>
            </div>
        </footer>

        <dialog id="dialog" onclick="closeDialog()">
            <div class="dialog-content">
                <button class="img-x">
                    <img src="./assets/icons/close.svg" />
                </button>
                <img
                    class="truck"
                    src="./assets/icons/delivery-truck-icon.png"
                />
                <h3>Order confirmed!</h3>
                <p>Your food is on the way!</p>
            </div>
        </dialog>

        <nav id="mobile-navbar">
            <div class="mobile-content">
                <div class="nav-item">
                    <img src="assets/icons/home-icon-white.png" alt="Home" />
                </div>
                <div class="nav-item">
                    <img
                        src="assets/icons/person-icon-white.png"
                        alt="Profil"
                    />
                </div>
                <div class="nav-item">
                    <img src="assets/icons/menu-icon-white.png" alt="Menü" />
                </div>

                <div
                    class="m-basket-icon"
                    onclick="toggleBasketMobile()"
                    title="Warenkorb öffnen">
                    <img
                        class="cart-icon"
                        src="assets/icons/shopping-cart-icon-white.png"
                        alt="Einkaufswagen"
                    />
                    <p id="mobile-cart">0</p>
                </div>
            </div>
        </nav>
        <dialog id="basket-mobile">
            <div class="mobile-basket-content">
                <div
                    id="basket-mobile-content">
                </div>
            </div>
        </dialog>
    </body>
</html>
