<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="fov icon" href="./assets/icons/fov-icon.svg" type="">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/standart.css">
    <link rel="stylesheet" href="style.css">
    <script src="./scripts/template.js"></script>
    <script src="./scripts/db.js"></script>
    <script src="./script.js" defer></script>
    <title>Hunger auf 🍔🍕oder🥗</title>
</head>
<body>
    <div class="body-img">
        <img src="./assets/img/header-image.jpg" alt="bg-img">
    </div>
    <header>
        <div class="header-content">
            <img class="logo" src="./assets/icons/Logo 02.svg" alt="Logo">
            <img class="nav-logo" src="./assets/icons/navbar.svg" alt="Navbar">
        </div>
    </header>
        <main>
            <div class="burger-logo">
                <img src="./assets/icons/main-icon.png" alt="bg-logo">
            </div>
            <div class="top-text">
                <div class="bh-and-rating">
                    <h1><span class="bg">Burger</span>House</h1>
                    <img src="./assets/icons/rating-icon.png" alt="rating-img">
                </div>
                    <p>The best of Burgers, Pizza and Greens, all in one great place.</p>
            </div>

            <section class="menu-container">
                <div class="burger-headline">
                    <div class="headline-content">
                        <img src="./assets/icons/burger-icon.png" alt="burger-icon">
                        <h2>Burger & Sandwiches</h2>
                    </div>
                </div>
            
                <section id="burger-menu">
                    <div class="burger-menu-content">
                        <div class="burger-dishes"></div>
                    </div>
                </section>

                <div class="pizza-headline">
                    <div class="headline-content">
                        <img src="./assets/icons/pizza-icon.png" alt="pizza-icon">
                        <h2>Pizza<span>(30cm)</span></h2>
                    </div>
                </div>
                <section id="pizza-menu">
                    <div class="pizza-menu-content">
                        <div class="pizza-dishes"></div>
                    </div>
                </section>

                <div class="salad-headline">
                    <div class="headline-content">
                        <img src="./assets/icons/salad-icon.png" alt="salad-icon">
                        <h2>Salad</h2>
                    </div>
                </div>
                <section id="salad-menu">
                    <div class="salad-menu-content">
                        <div class="salad-dishes"></div>
                    </div>
                </section>
            
            </section>
        </main>
        <footer>
            <div class="footer-content">
                <div class="copy-text">
                <img src="./assets/icons/copyright.svg" alt="copyright">
                <p>2025 BurgerHouse</p>
                </div>
                <p>Imprint</p>
                <p>Cookie Preferences</p>
            </div>
        </footer>
</body>
</html>
